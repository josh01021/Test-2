<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#101827">
  <title>Geen internetverbinding | Vastgoed Dashboard</title>
  <style>
    *{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px;background:#101827;color:#172033;font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.card{width:min(480px,100%);padding:30px;border-radius:22px;background:#fff;box-shadow:0 24px 80px rgba(0,0,0,.28)}.icon{width:58px;height:58px;display:grid;place-items:center;margin-bottom:18px;border-radius:16px;background:#e2e8f0;font-size:27px}h1{margin:0 0 10px;font-size:26px}p{margin:0 0 20px;color:#64748b;line-height:1.55}button{border:0;border-radius:12px;background:#172033;color:#fff;padding:12px 16px;font:700 15px inherit;cursor:pointer}.note{margin-top:18px;padding-top:16px;border-top:1px solid #e2e8f0;font-size:13px;color:#64748b}
  </style>
</head>
<body>
  <main class="card">
    <div class="icon" aria-hidden="true">⌁</div>
    <h1>Geen internetverbinding</h1>
    <p>Het vastgoed-dashboard heeft een internetverbinding nodig om actuele en beveiligde gegevens uit Supabase te laden.</p>
    <button type="button" onclick="location.reload()">Opnieuw proberen</button>
    <div class="note">Er worden op deze offlinepagina geen vastgoed-, contract- of huurdersgegevens getoond.</div>
  </main>
</body>
</html>
